<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>บริการของฉัน</title>
  <style>
    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --line:#dfe5ee;
      --text:#1f2937;
      --muted:#6b7280;
      --primary:#1aa3b0;
      --primary-dark:#117e89;
      --green:#22c55e;
      --green-soft:#ecfdf3;
      --orange:#f59e0b;
      --orange-soft:#fff7e6;
      --red:#ef4444;
      --red-soft:#fff1f1;
      --shadow:0 10px 28px rgba(15,23,42,.08);
      --radius:8px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Tahoma, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .top-line{
      height:4px;
      background:linear-gradient(90deg,#1aa3b0,#2dc7b5,#5fd38d);
    }

    .container{
      max-width:1200px;
      margin:0 auto;
      padding:18px 16px 28px;
    }

    .page-title{
      font-size:22px;
      font-weight:700;
      margin:0 0 6px;
      color:#0f172a;
    }

    .breadcrumb{
      font-size:11px;
      color:var(--muted);
      margin-bottom:16px;
    }

    .toolbar-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
      flex-wrap:wrap;
    }

    .toolbar-left,
    .toolbar-right{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .search-box{
      position:relative;
    }

    .search-box input{
      width:240px;
      height:34px;
      border:1px solid var(--line);
      border-radius:6px;
      padding:0 10px 0 32px;
      outline:none;
      background:#fff;
      font-size:12px;
    }

    .search-box:before{
      content:"⌕";
      position:absolute;
      left:10px;
      top:50%;
      transform:translateY(-50%);
      color:#94a3b8;
      font-size:14px;
    }

    .btn{
      height:34px;
      border:none;
      border-radius:6px;
      padding:0 12px;
      font-size:12px;
      font-weight:700;
      cursor:pointer;
      transition:.18s;
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      color:#fff;
      box-shadow:0 8px 18px rgba(26,163,176,.18);
    }

    .btn-primary:hover{filter:brightness(.98)}
    .btn-secondary{
      background:#fff;
      color:#334155;
      border:1px solid var(--line);
    }
    .btn-secondary:hover{background:#f8fafc}

    .table-card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:4px;
      overflow:hidden;
      box-shadow:0 1px 2px rgba(0,0,0,.03);
    }

    .table-actions{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:10px 12px;
      border-bottom:1px solid var(--line);
      background:#fafafa;
      flex-wrap:wrap;
    }

    .select{
      height:30px;
      border:1px solid #cfd8e3;
      border-radius:3px;
      padding:0 8px;
      background:#fff;
      font-size:12px;
      outline:none;
      color:#334155;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    thead th{
      text-align:left;
      font-size:12px;
      color:#5b6574;
      font-weight:700;
      padding:10px 14px;
      border-bottom:1px solid var(--line);
      background:#fff;
      white-space:nowrap;
    }

    tbody td{
      padding:12px 14px;
      border-bottom:1px solid #edf2f7;
      vertical-align:middle;
      font-size:13px;
    }

    tbody tr:hover{
      background:#fbfdff;
    }

    .service-cell .name{
      font-size:15px;
      font-weight:400;
      color:#1f2937;
      margin-bottom:5px;
      display:flex;
      align-items:center;
      gap:7px;
    }

    .service-cell .name:before{
      content:"☁";
      color:#111827;
      font-size:13px;
    }

    .service-cell .meta{
      font-size:12px;
      line-height:1.35;
    }

    .service-cell .host{
      color:#0ea5b7;
      font-weight:700;
      text-decoration:none;
      display:block;
      margin-bottom:2px;
    }

    .service-cell .ip{
      color:#111827;
    }

    .price-main{
      font-size:15px;
      font-weight:400;
      color:#1f2937;
      margin-bottom:4px;
    }

    .price-sub{
      font-size:11px;
      color:#000;
    }

    .date-main{
      font-size:14px;
      color:#1f2937;
      margin-bottom:4px;
      white-space:nowrap;
    }

    .status-wrap{
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-size:13px;
      font-weight:700;
      white-space:nowrap;
    }

    .dot{
      width:6px;
      height:6px;
      border-radius:50%;
      display:inline-block;
    }

    .status-active{color:var(--green)}
    .status-active .dot{background:var(--green)}
    .status-soon{color:var(--orange)}
    .status-soon .dot{background:var(--orange)}
    .status-expired{color:var(--red)}
    .status-expired .dot{background:var(--red)}
    .status-suspended{color:#64748b}
    .status-suspended .dot{background:#64748b}

    .menu-btn{
      background:none;
      border:none;
      cursor:pointer;
      font-size:20px;
      color:#9ca3af;
      padding:0 8px;
      line-height:1;
    }

    .menu-wrap{
      position:relative;
      display:inline-block;
    }

    .menu{
      position:absolute;
      top:24px;
      right:0;
      min-width:150px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:8px;
      box-shadow:var(--shadow);
      display:none;
      z-index:20;
      overflow:hidden;
    }

    .menu.open{display:block}

    .menu button{
      width:100%;
      border:none;
      background:#fff;
      text-align:left;
      padding:10px 12px;
      font-size:13px;
      cursor:pointer;
    }

    .menu button:hover{
      background:#f8fafc;
    }

    .bottom-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:10px 12px;
      font-size:12px;
      color:#6b7280;
      flex-wrap:wrap;
      gap:10px;
      background:#fafafa;
    }

    .pagination{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .page-num{
      width:22px;
      height:22px;
      border-radius:3px;
      background:#1f2937;
      color:#fff;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:12px;
      font-weight:700;
    }

    .status-pill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:5px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
    }

    .pill-green{background:var(--green-soft); color:#15803d;}
    .pill-orange{background:var(--orange-soft); color:#b45309;}
    .pill-red{background:var(--red-soft); color:#b91c1c;}
    .pill-gray{background:#f1f5f9; color:#475569;}

    .modal-backdrop{
      position:fixed;
      inset:0;
      background:rgba(15,23,42,.45);
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
      z-index:100;
    }

    .modal-backdrop.show{display:flex}

    .modal{
      width:100%;
      max-width:520px;
      background:#fff;
      border-radius:12px;
      box-shadow:0 18px 40px rgba(0,0,0,.18);
      overflow:hidden;
    }

    .modal-header{
      padding:14px 16px;
      border-bottom:1px solid var(--line);
      background:#f8fbfc;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .modal-title{
      font-size:18px;
      font-weight:700;
      margin:0;
    }

    .close-btn{
      border:none;
      background:none;
      font-size:20px;
      cursor:pointer;
      color:#64748b;
    }

    .modal-body{
      padding:16px;
    }

    .form-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .field.full{grid-column:1 / -1}

    .field label{
      font-size:12px;
      font-weight:700;
      color:#475569;
    }

    .field input,
    .field select{
      height:38px;
      border:1px solid #d6dee8;
      border-radius:8px;
      padding:0 10px;
      outline:none;
      font-size:13px;
      background:#fff;
    }

    .field input:focus,
    .field select:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(26,163,176,.12);
    }

    .modal-footer{
      padding:14px 16px;
      border-top:1px solid var(--line);
      display:flex;
      justify-content:flex-end;
      gap:8px;
      background:#fcfcfd;
    }

    .empty{
      padding:32px 16px;
      text-align:center;
      color:#64748b;
      display:none;
      background:#fff;
    }

    .save-info{
      font-size:12px;
      color:#16a34a;
      font-weight:700;
    }

    @media (max-width:900px){
      .table-card{overflow:auto}
      table{min-width:900px}
    }

    @media (max-width:640px){
      .toolbar-top,
      .table-actions,
      .bottom-bar{
        flex-direction:column;
        align-items:stretch;
      }
      .search-box input{
        width:100%;
      }
      .form-grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="top-line"></div>

  <div class="container">
    <h1 class="page-title">บริการของฉัน</h1>
    <div class="breadcrumb">หน้าหลัก / ภาพรวม / บริการของฉัน</div>

    <div class="toolbar-top">
      <div class="toolbar-left">
        <div class="search-box">
          <input id="searchInput" type="text" placeholder="ค้นหา VPS, Hostname, IP" />
        </div>
        <span class="save-info" id="saveInfo">บันทึกอัตโนมัติเปิดอยู่</span>
      </div>

      <div class="toolbar-right">
        <button class="btn btn-secondary" id="importBtn">นำเข้าไฟล์</button>
        <button class="btn btn-secondary" id="exportBtn">สำรองไฟล์</button>
        <button class="btn btn-primary" id="addBtn">+ เลือกซื้อบริการใหม่</button>
        <input type="file" id="importFile" accept="application/json" hidden />
      </div>
    </div>

    <div class="table-card">
      <div class="table-actions">
        <div class="toolbar-left">
          <select class="select" id="filterStatus">
            <option value="all">เลือกรายการทั้งหมด</option>
            <option value="active">พร้อมใช้งาน</option>
            <option value="soon">ใกล้หมดอายุ</option>
            <option value="expired">หมดอายุ</option>
            <option value="suspended">ระงับบริการ</option>
          </select>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th>บริการของฉัน</th>
            <th>ราคา</th>
            <th>วันหมดอายุ</th>
            <th>สถานะ</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="serviceTable"></tbody>
      </table>

      <div id="emptyState" class="empty">ไม่พบข้อมูล</div>

      <div class="bottom-bar">
        <div>
          แสดง
          <select class="select" style="height:26px;" disabled>
            <option>10</option>
          </select>
          รายการ
        </div>

        <div class="pagination">
          <span>ก่อนหน้า</span>
          <span class="page-num">1</span>
          <span>ถัดไป</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">แก้ไขบริการ</h3>
        <button class="close-btn" id="closeModalBtn">×</button>
      </div>
      <div class="modal-body">
        <form id="serviceForm">
          <input type="hidden" id="editId" />
          <div class="form-grid">
            <div class="field full">
              <label>ชื่อบริการ</label>
              <input id="serviceName" required />
            </div>

            <div class="field full">
              <label>Hostname</label>
              <input id="serviceHost" required />
            </div>

            <div class="field">
              <label>IP Address</label>
              <input id="serviceIp" required />
            </div>

            <div class="field">
              <label>ราคา</label>
              <input id="servicePrice" type="number" min="0" required />
            </div>

            <div class="field">
              <label>วันหมดอายุ</label>
              <input id="serviceExpire" type="date" required />
            </div>

            <div class="field">
              <label>สถานะ</label>
              <select id="serviceStatus" required>
                <option value="active">พร้อมใช้งาน</option>
                <option value="soon">ใกล้หมดอายุ</option>
                <option value="expired">หมดอายุ</option>
                <option value="suspended">ระงับบริการ</option>
              </select>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancelBtn" type="button">ยกเลิก</button>
        <button class="btn btn-primary" id="saveBtn" type="button">บันทึก</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "services_dashboard_clean_v2";

    const sampleData = [
      { id: crypto.randomUUID(), name: "Cloud VPS 2", host: "17552699.cloudvps.in.th", ip: "103.91.204.64", price: 299, expire: "2026-05-25", status: "active" },
      { id: crypto.randomUUID(), name: "Cloud VPS 2", host: "29750440.cloudvps.in.th", ip: "143.14.4.220", price: 299, expire: "2026-05-26", status: "active" },
      { id: crypto.randomUUID(), name: "Cloud VPS 2", host: "74909995.cloudvps.in.th", ip: "143.14.14.184", price: 299, expire: "2026-05-21", status: "active" },
      { id: crypto.randomUUID(), name: "Cloud VPS 2", host: "96789822.cloudvps.in.th", ip: "103.91.205.86", price: 299, expire: "2026-05-27", status: "active" },
      { id: crypto.randomUUID(), name: "Cloud VPS 3", host: "06710469.cloudvps.in.th", ip: "102.129.229.219", price: 499, expire: "2026-06-12", status: "active" },
      { id: crypto.randomUUID(), name: "Cloud VPS 3", host: "20449060.cloudvps.in.th", ip: "66.212.22.188", price: 499, expire: "2026-06-06", status: "active" },
      { id: crypto.randomUUID(), name: "Cloud VPS 3", host: "73017633.cloudvps.in.th", ip: "66.212.22.179", price: 499, expire: "2026-06-05", status: "active" },
      { id: crypto.randomUUID(), name: "Cloud VPS 3", host: "83150142.cloudvps.in.th", ip: "103.91.205.148", price: 499, expire: "2026-06-04", status: "active" },
      { id: crypto.randomUUID(), name: "Cloud VPS 3", host: "95095380.cloudvps.in.th", ip: "103.91.205.46", price: 499, expire: "2026-06-06", status: "active" }
    ];

    let services = loadServices();

    const serviceTable = document.getElementById("serviceTable");
    const emptyState = document.getElementById("emptyState");
    const searchInput = document.getElementById("searchInput");
    const filterStatus = document.getElementById("filterStatus");
    const modalBackdrop = document.getElementById("modalBackdrop");
    const serviceForm = document.getElementById("serviceForm");

    function loadServices() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        return saved ? JSON.parse(saved) : sampleData;
      } catch (e) {
        return sampleData;
      }
    }

    function saveServices() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(services));
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr + "T00:00:00");
      return date.toLocaleDateString("en-US", {
        weekday: "long",
        month: "long",
        day: "numeric",
        year: "numeric"
      });
    }

    function getStatusLabel(status) {
      return {
        active: "พร้อมใช้งาน",
        soon: "ใกล้หมดอายุ",
        expired: "หมดอายุ",
        suspended: "ระงับบริการ"
      }[status] || "พร้อมใช้งาน";
    }

    function getStatusClass(status) {
      return {
        active: "status-active",
        soon: "status-soon",
        expired: "status-expired",
        suspended: "status-suspended"
      }[status] || "status-active";
    }

    function getFilteredData() {
      const keyword = searchInput.value.trim().toLowerCase();
      const filter = filterStatus.value;

      return services.filter(item => {
        const matchKeyword =
          !keyword ||
          item.name.toLowerCase().includes(keyword) ||
          item.host.toLowerCase().includes(keyword) ||
          item.ip.toLowerCase().includes(keyword) ||
          String(item.price).includes(keyword);

        const matchFilter = filter === "all" || item.status === filter;
        return matchKeyword && matchFilter;
      });
    }

    function closeAllMenus() {
      document.querySelectorAll(".menu").forEach(m => m.classList.remove("open"));
    }

    function renderTable() {
      const data = getFilteredData();
      serviceTable.innerHTML = "";

      if (!data.length) {
        emptyState.style.display = "block";
        return;
      }

      emptyState.style.display = "none";

      data.forEach(item => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>
            <div class="service-cell">
              <div class="name">${item.name}</div>
              <div class="meta">
                <a href="#" class="host" onclick="return false;">${item.host}</a>
                <div class="ip">🖥 ${item.ip}</div>
              </div>
            </div>
          </td>
          <td>
            <div class="price-main">${Number(item.price).toLocaleString("th-TH")} บาท</div>
            <div class="price-sub">รายเดือน</div>
          </td>
          <td>
            <div class="date-main">${formatDate(item.expire)}</div>
          </td>
          <td>
            <div class="status-wrap ${getStatusClass(item.status)}">
              <span class="dot"></span>
              <span>${getStatusLabel(item.status)}</span>
            </div>
          </td>
          <td style="text-align:right;">
            <div class="menu-wrap">
              <button class="menu-btn" onclick="toggleMenu(event, '${item.id}')">...</button>
              <div class="menu" id="menu-${item.id}">
                <button onclick="openEdit('${item.id}')">แก้ไข</button>
                <button onclick="duplicateItem('${item.id}')">คัดลอกรายการ</button>
                <button onclick="removeItem('${item.id}')">ลบรายการ</button>
              </div>
            </div>
          </td>
        `;
        serviceTable.appendChild(tr);
      });
    }

    function toggleMenu(event, id) {
      event.stopPropagation();
      const menu = document.getElementById(`menu-${id}`);
      const isOpen = menu.classList.contains("open");
      closeAllMenus();
      if (!isOpen) menu.classList.add("open");
    }

    function openModal() {
      modalBackdrop.classList.add("show");
    }

    function closeModal() {
      modalBackdrop.classList.remove("show");
      serviceForm.reset();
      document.getElementById("editId").value = "";
    }

    function openAdd() {
      document.getElementById("modalTitle").textContent = "เพิ่มบริการใหม่";
      document.getElementById("editId").value = "";
      serviceForm.reset();
      document.getElementById("serviceStatus").value = "active";
      openModal();
    }

    function openEdit(id) {
      closeAllMenus();
      const item = services.find(s => s.id === id);
      if (!item) return;

      document.getElementById("modalTitle").textContent = "แก้ไขบริการ";
      document.getElementById("editId").value = item.id;
      document.getElementById("serviceName").value = item.name;
      document.getElementById("serviceHost").value = item.host;
      document.getElementById("serviceIp").value = item.ip;
      document.getElementById("servicePrice").value = item.price;
      document.getElementById("serviceExpire").value = item.expire;
      document.getElementById("serviceStatus").value = item.status;

      openModal();
    }

    function saveForm() {
      const id = document.getElementById("editId").value;
      const payload = {
        id: id || crypto.randomUUID(),
        name: document.getElementById("serviceName").value.trim(),
        host: document.getElementById("serviceHost").value.trim(),
        ip: document.getElementById("serviceIp").value.trim(),
        price: Number(document.getElementById("servicePrice").value || 0),
        expire: document.getElementById("serviceExpire").value,
        status: document.getElementById("serviceStatus").value
      };

      if (!payload.name || !payload.host || !payload.ip || !payload.expire) {
        alert("กรุณากรอกข้อมูลให้ครบ");
        return;
      }

      if (id) {
        services = services.map(s => s.id === id ? payload : s);
      } else {
        services.unshift(payload);
      }

      saveServices();
      renderTable();
      closeModal();
    }

    function removeItem(id) {
      closeAllMenus();
      if (!confirm("ต้องการลบรายการนี้ใช่ไหม?")) return;
      services = services.filter(s => s.id !== id);
      saveServices();
      renderTable();
    }

    function duplicateItem(id) {
      closeAllMenus();
      const item = services.find(s => s.id === id);
      if (!item) return;

      const copy = {
        ...item,
        id: crypto.randomUUID(),
        name: item.name + " (Copy)"
      };

      services.unshift(copy);
      saveServices();
      renderTable();
    }

    function exportData() {
      const backup = {
        app: "บริการของฉัน",
        exportedAt: new Date().toISOString(),
        data: services
      };
      const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "services-backup.json";
      a.click();
      URL.revokeObjectURL(url);
    }

    function importData(file) {
      const reader = new FileReader();
      reader.onload = function() {
        try {
          const parsed = JSON.parse(reader.result);
          const imported = Array.isArray(parsed) ? parsed : parsed.data;
          if (!Array.isArray(imported)) throw new Error("invalid");
          services = imported;
          saveServices();
          renderTable();
          alert("นำเข้าข้อมูลสำเร็จ");
        } catch (e) {
          alert("ไฟล์ไม่ถูกต้อง");
        }
      };
      reader.readAsText(file);
    }

    document.getElementById("addBtn").addEventListener("click", openAdd);
    document.getElementById("closeModalBtn").addEventListener("click", closeModal);
    document.getElementById("cancelBtn").addEventListener("click", closeModal);
    document.getElementById("saveBtn").addEventListener("click", saveForm);
    document.getElementById("exportBtn").addEventListener("click", exportData);
    document.getElementById("importBtn").addEventListener("click", () => document.getElementById("importFile").click());
    document.getElementById("importFile").addEventListener("change", (e) => {
      if (e.target.files[0]) importData(e.target.files[0]);
      e.target.value = "";
    });

    searchInput.addEventListener("input", renderTable);
    filterStatus.addEventListener("change", renderTable);

    modalBackdrop.addEventListener("click", function(e){
      if (e.target === modalBackdrop) closeModal();
    });

    document.addEventListener("click", closeAllMenus);

    renderTable();

    window.openEdit = openEdit;
    window.removeItem = removeItem;
    window.duplicateItem = duplicateItem;
    window.toggleMenu = toggleMenu;
  </script>
</body>
</html>
